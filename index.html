<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Ajouter un Examen</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    form {
      max-width: 400px;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input,
    textarea {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      background-color: #4CAF50;
    }
    
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>

<body>
  <h1>Créer un nouvel examen</h1>

  <form id="form-examen">
    <!-- Champ : nom de l'examen -->
    <label for="nom">Nom de l'examen :</label>
    <input type="text" id="nom" name="nom" required>

    <!-- Champ : durée en minutes -->
    <label for="duree">Durée (minutes) :</label>
    <input type="number" id="duree" name="duree" min="1" required>

    <!-- Zone de texte : description -->
    <label for="description">Description :</label>
    <textarea id="description" name="description"></textarea>

    <!-- Champ : nom du propriétaire -->
    <label for="proprietaire">Nom du propriétaire :</label>
    <input type="text" id="proprietaire" name="proprietaire" required>

    <button type="submit">Ajouter l'examen</button>
  </form>

  <!-- Lier le fichier JavaScript -->
  <script src="script.js"></script>
</body>

</html>
