<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Ajouter un Examen</title>
</head>

<body>
  <h1>Créer un nouvel examen</h1>

  <form id="form-examen">
    <!-- Champ : nom de l'examen -->
   <label for="nom">Nom de l'examen :</label>
    <input type="text" id="nom" name="nom" required>

    <!-- Champ : durée en minutes -->
    <label for="duree">Durée (minutes) :</label>
    <input type="number" id="duree" name="duree" min="1" required>

    <!-- Zone de texte : description -->
    <label for="description">Description :</label>
    <textarea id="description" name="description"></textarea>

    <!-- Champ : nom du propriétaire -->
    <label for="proprietaire">Nom du propriétaire :</label>
    <input type="text" id="proprietaire" name="proprietaire" required>

    <button type="submit">Ajouter l'examen</button>
  </form>

  <!-- Lier le fichier JavaScript -->
  <script src="script.js"></script>
</body>

</html>
